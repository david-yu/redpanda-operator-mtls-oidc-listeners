# Redpanda cluster with dual external Kafka listeners:
# - oidc (port 30094 / NodePort 31094): SASL/OAUTHBEARER via Dex OIDC
# - mtls (port 30095 / NodePort 30095): mTLS client certificate auth
apiVersion: cluster.redpanda.com/v1alpha2
kind: Redpanda
metadata:
  name: redpanda
  namespace: redpanda
spec:
  clusterSpec:
    statefulset:
      replicas: 1

    tls:
      enabled: true
      certs:
        default:
          caEnabled: true

    auth:
      sasl:
        enabled: true
        mechanism: SCRAM-SHA-256
        users:
          - name: admin
            password: admin-secret
            mechanism: SCRAM-SHA-256

    external:
      enabled: true
      type: NodePort
      addresses:
        - localhost

    listeners:
      kafka:
        authenticationMethod: sasl
        external:
          # Listener 1: OIDC via SASL/OAUTHBEARER
          oidc:
            port: 30094
            advertisedPorts:
              - 31094
            tls:
              enabled: true
              cert: default

          # Listener 2: mTLS client certificate authentication
          mtls:
            port: 30095
            authenticationMethod: mtls_identity
            tls:
              enabled: true
              cert: default
              requireClientAuth: true

    config:
      cluster:
        sasl_mechanisms:
          - SCRAM
          - OAUTHBEARER
        oidc_discovery_url: "http://dex.dex.svc.cluster.local:5556/dex/.well-known/openid-configuration"
        oidc_token_audience: "redpanda"
        oidc_principal_mapping: "$.email"
        # sasl_mechanisms_overrides uses the Redpanda list-of-objects format.
        # Each entry maps a listener name to its allowed SASL mechanisms.
        sasl_mechanisms_overrides:
          - listener: oidc
            sasl_mechanisms:
              - OAUTHBEARER
